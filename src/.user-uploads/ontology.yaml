  name: Passive Product Criteria
  description: 'The set of characteristics that define an ideal product for passive
    income streams: requiring no ongoing fulfillment, sourceable once and replicable
    infinitely, and ideally offering recurring revenue potential like SaaS products.
    This skill involves evaluating and selecting products that protect your time and
    energy while generating sustainable income.'
  concept_ids: []
  aliases: []
- id: THREE_FACTOR_ENVIRONMENT
  name: Three Factor Environment
  description: 'The skill of identifying and operating within markets defined by three
    key factors: Hard-to-Value Assets (unclear pricing), Inefficient Marketplaces
    (no transparent distribution channels), and Large Transaction Sizes (high-value
    deals); mastering this creates natural leverage where ''normal folks just start
    crushing it.'''
  concept_ids: []
  aliases: []
- id: ROYALTY_MODEL
  name: Royalty Model
  description: A compensation structure where you receive ongoing payments based on
    a percentage of revenue generated, allowing you to stack multiple income streams
    without requiring upfront capital or full ownership of assets.
  concept_ids: []
  aliases: []
- id: RENT_TO_SELLERS
  name: Rent To Sellers
  description: The practice of placing your content, products, or services (vending
    machines) inside existing platforms, businesses, or distribution channels that
    already have established traffic and buyers, rather than trying to build audience
    from scratch.
