version: 1
north_stars:
- id: SERVE_NO_MASTER
  name: Serve No Master
  description: Building sustainable autonomy by creating passive revenue streams from
    assets and partnerships, enabling you to make decisions based on your values rather
    than client demands, employer constraints, or financial desperation.
  aliases:
  - make more money
  - financial independence
  - escape the 9 to 5
  - join the new rich
  - six figure months
  - seven figures
- id: ACQUIRE_AND_LEVERAGE_ASSETS
  name: Acquire & Leverage Assets
  description: Building sustainable income by strategically acquiring underutilized
    or undervalued assets (courses, databases, systems, IP, traffic, audiences) and
    deploying them across multiple partners, channels, and markets to generate recurring
    revenue without proportional increases in time or energy.
  aliases:
  - Underutilized Assets
  - trash can assets
  - Access Control Ownership (ACO)
  - IP is the best asset
  - asset multiplication
- id: PROTECT_TIME_AND_ENERGY
  name: Protect Your Time & Energy
  description: Ruthlessly choosing activities, relationships, and opportunities based
    on whether they protect or deplete your energy, since time and energy are your
    most valuable and finite assets -- more valuable than money itself.
  aliases:
  - Time Freedom
  - Energy Allocation
  - Selective Commitment
  - Defending Your Bandwidth
  - The Gate Keeper Role
- id: ADOPT_INVESTOR_MINDSET
  name: Adopt Investor Mindset
  description: The foundational shift from employee thinking to investor thinking,
    treating time, energy, and creativity as capital to deploy strategically toward
    high-return activities.
  aliases:
  - investor mindset
  - capital deployment
  - employee vs investor thinking
  - treat time as capital
  - strategic resource allocation
- id: NORTH
  name: North
  description: 'The overarching direction and purpose guiding all strategic decisions
    and skill-building in Travis''s content library: to help people escape financial
    dependence (''hell'') and achieve sovereign income streams and financial independence
    (''heaven'').'
  aliases: []
- id: STAR
  name: Star
  description: 'The dual focal point of Travis''s teaching philosophy: Serve No Master
    (achieve independence from employment and external control) and Acquire and Leverage
    Assets (build income-generating products, audiences, and systems that work without
    trading time for money).'
  aliases: []
concepts:
- id: GIVING_FUNNEL
  name: The Giving FUNnel
  description: 'A framework for turning high-intent prospects into pre-sold leads
    and then into a steady pipeline of first meetings (coffee dates) by leading with
    value instead of neediness. Built on four legs: Specific Problem(s), Super Power,
    Sampling, and Stock Your Pond.'
  north_star_ids:
  - SERVE_NO_MASTER
  - PROTECT_TIME_AND_ENERGY
  aliases:
  - giving funnel
  - CDOD giving funnel
  - lead with value funnel
  - prospect to lead to coffee date pipeline
  - build a garden that attracts butterflies
- id: NEEDINESS_ELIMINATION
  name: Neediness Elimination
  description: The principle that neediness is the biggest deal blocker. Having a
    steady stream of people waiting to do business with you eliminates neediness and
    dramatically improves closing ability. 'Needy people have skinny kids.'
  north_star_ids:
  - SERVE_NO_MASTER
  - PROTECT_TIME_AND_ENERGY
  aliases:
  - neediness is the biggest deal blocker
  - needy people have skinny kids
  - eliminate neediness
  - abundance mindset in sales
  - steady stream eliminates neediness
- id: HERO_AUCTION
  name: Hero Auction
  description: A strategy where businesses create irresistible 'fantasy packages'
    starting at $1 bids, using psychological triggers like curiosity, FOMO, social
    proof, and competitive bidding to emotionally invest potential customers. The
    real profit comes not from the auction winner but from following up with losing
    bidders who demonstrated buying intent.
  north_star_ids:
  - SERVE_NO_MASTER
  - ACQUIRE_AND_LEVERAGE_ASSETS
  aliases:
  - auction style selling
  - fantasy package auction
  - $1 minimum bid auction
  - auction deal
  - bidding psychology
  - auction as lead gen
  - irresistible fantasy packages
- id: LOSING_BIDDERS_GOLDMINE
  name: Losing Bidders Goldmine
  description: The insight that the auction is not about the winner -- it's a tool
    to identify every person who raised their hand and said 'I want that.' The losing
    bidders are pre-sold, emotionally invested leads who close at ~50% on backend
    offers, generating the bulk of revenue (e.g., $170K from one auction).
  north_star_ids:
  - SERVE_NO_MASTER
  - ACQUIRE_AND_LEVERAGE_ASSETS
  aliases:
  - auction is not about the winner
  - losing bidder follow-up
  - 50% close rate on backend
  - bidders are pre-sold
  - hand raisers from auction
  - $170K from auction follow-up
- id: CD3_FORMULA
  name: CD³ Formula (Clearly Desirable × Clearly Doable × Clearly Different)
  description: 'A framework for evaluating and sharpening an offer by scoring three
    dimensions: how strongly customers want it (Desirability), how achievable it feels
    (Doability), and how distinct it is from alternatives (Differentiation). Each
    scored 1-10. ''CLEARLY'' means no thinking required.'
  north_star_ids:
  - SERVE_NO_MASTER
  aliases:
  - CD3 formula
  - clearly desirable clearly doable clearly different
  - sell it in a sentence
  - sort sift paid
  - offer scoring framework
  - desirability doability differentiation
- id: FIVE_PS_PRE_SELLING
  name: The 5 Ps of Pre-Selling
  description: A pre-selling framework built around five sequential steps (the 5 Ps)
    that guide prospects through a process before making an offer, so they're primed
    and ready to buy when you present it. Achieves 50-90% sales conversion rates.
  north_star_ids:
  - SERVE_NO_MASTER
  aliases:
  - 5 Ps
  - five Ps
  - pre-selling framework
  - pre-sell all 5Ps
  - 90% conversion pre-selling
  - pre-sold partners
  - pre-selling secrets
- id: BOTTOM_DOLLAR_TRUTH_SERUM
  name: Bottom Dollar Truth Serum
  description: A framework for uncovering real motivations and objections that drive
    buying decisions through structured questioning. Uses carefully chosen language
    to create safety so people share honest information instead of defensive or false
    answers, enabling sharper messaging and higher-converting offers.
  north_star_ids:
  - SERVE_NO_MASTER
  aliases:
  - BDTS
  - truth serum messaging
  - wallet wreckers
  - truth serum framework
  - extracting real buying motivations
  - structured questioning for sales
- id: BUYING_FRENZY_OFFER_TOOL
  name: Buying Frenzy Offer Tool (BFOT)
  description: A framework for designing compelling, easy-to-say-yes-to informational
    offers by framing them as a clear 'investment -> reward' exchange grounded in
    tangible outcomes. Lists concrete tasks/worries the audience would pay to eliminate,
    then ranks by urgency, emotional intensity, frequency of thought, and solution
    scarcity to find the strongest offer angle. 'Lane bumpers for bowling, but for
    offers.'
  north_star_ids:
  - SERVE_NO_MASTER
  aliases:
  - BFOT
  - buying frenzy offer tool
  - lane bumpers for offers
  - gimme blank and I'll give you blank
  - offer design tool for non-creative people
  - investment to reward framework
- id: TWO_PAGE_GOOGLE_DOC_CASH_MACHINE
  name: 2-Page Google Doc Cash Machine
  description: 'A minimalist sales approach: create a micro-offer in a short Google
    Doc with a PayPal payment link, promote it with a simple social post, and drive
    quick sales. Designed for fast, low-effort testing of offers -- from blank doc
    to sales in 30 minutes.'
  north_star_ids:
  - SERVE_NO_MASTER
  - PROTECT_TIME_AND_ENERGY
  aliases:
  - 2 page g doc cash machine
  - google doc cash machine
  - microwave offer
  - bite-sized offer
  - blank doc to sales poppin in PayPal
  - ugly g doc sales
  - micro-offer in a google doc
- id: ESCAPE_HELL_ENTER_HEAVEN
  name: Escape from Hell / Entrance into Heaven
  description: A messaging and offer design principle that the most compelling copy
    and offers combine an escape from a painful current state (Hell) with arrival
    at a desirable future state (Heaven). Used to frame transformations in emails
    and offers.
  north_star_ids:
  - SERVE_NO_MASTER
  aliases:
  - escape from hell entrance into heaven
  - from pain to gain
  - hell to heaven transformation
  - hell island vs heaven island
  - escape the 9 to 5 join the new rich
- id: COFFEE_DATE_MODEL
  name: Coffee Date Model
  description: A relationship-based sales approach where first meetings are structured
    as low-pressure 'coffee dates' (typically on Zoom) rather than hard pitches. Used
    for Beamer deals, auction deals, referral mojo, buying newsletters, communities,
    and off-market opportunities.
  north_star_ids:
  - SERVE_NO_MASTER
  - PROTECT_TIME_AND_ENERGY
  aliases:
  - coffee date
  - coffee dates on demand
  - CDOD
  - first meeting as coffee date
  - piping hot coffee dates
  - steady stream of coffee dates
- id: NEWSLETTER_ACQUISITION
  name: Newsletter Acquisition Strategy
  description: A strategy for purchasing email newsletters as undervalued assets.
    Includes due diligence, dating (advertising in the newsletter first), understanding
    seller motivation, negotiating for transfer help and endorsement to existing subscribers.
    The acquisition is a 'no brainer' when combined with rainmaking skills.
  north_star_ids:
  - ACQUIRE_AND_LEVERAGE_ASSETS
  - SERVE_NO_MASTER
  aliases:
  - buy the damn thing
  - email newsletter purchase
  - buying newsletters
  - date before purchasing
  - newsletter acquisition
  - endorsement transfer
- id: PARTNER_PROMOTION_INTERVIEW
  name: Partner Promotion Interview
  description: A strategy where Travis interviews and promotes a partner to his audiences
    for one year, pre-selling all 5 Ps, vouching for them, placing the interview in
    flow within Royalty Rockstars, and building a waiting list of pre-sold partners.
    Sold via auction format.
  north_star_ids:
  - SERVE_NO_MASTER
  - ACQUIRE_AND_LEVERAGE_ASSETS
  aliases:
  - I get you partners
  - interview and promote you
  - partner endorsement interview
  - waiting list of partners
  - pre-sold partner pipeline
- id: OLD_PLAYBOOK_VS_NEW_PLAYBOOK
  name: Old Playbook vs. New Playbook
  description: 'A contrasting mental model: the old playbook of complicated funnels,
    frantic social media posting, and ad spend that leads to burnout with low-quality
    leads, versus the new approach of simple, psychology-driven strategies (like auctions)
    that generate pre-sold, high-intent buyers.'
  north_star_ids:
  - SERVE_NO_MASTER
  - PROTECT_TIME_AND_ENERGY
  aliases:
  - hamster wheel marketing
  - old playbook
  - complicated funnels vs simple strategies
  - burnout marketing vs auction strategy
  - grind marketing vs fun marketing
