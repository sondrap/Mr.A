  description: 'Crafting a simple email using the T1 template: state what''s happening,
    highlight the clear benefit (escape from hell / entrance into heaven), and end
    with a direct invitation (''Would you like to join us?''). Used on your own list
    or others'' lists.'
  concept_ids:
  - ESCAPE_HELL_ENTER_HEAVEN
  - BUYING_FRENZY_OFFER_TOOL
  aliases:
  - T1 email
  - handraiser email
  - RSVP email template
  - simple selling email
  - million dollar template
- id: CREATE_MICROWAVE_OFFER
  name: Creating a Microwave Offer in a Google Doc
  description: Whipping up a bite-sized micro-offer in a 2-page Google Doc with a
