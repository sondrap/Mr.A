- id: WRITE_SYMPTOM_BASED_SUBJECT_LINES
  name: Write Symptom Based Subject Lines
  description: A persuasive copywriting skill that crafts email subject lines by naming
    specific pain points (Hell Island), pairing them with obstacles or constraints
    (Shark), and teasing a solution or plan. Uses five core templates built around
    moving readers from their current painful state to a desired future state, with
    emphasis on concrete, specific language rather than vague emotional appeals.
  concept_ids: []
  aliases: []
- id: SUBJECT
  name: Subject
  description: The opening statement in an email that determines whether a recipient
    opens the message; it's the critical first touchpoint that must capture attention
    and compel action.
  concept_ids: []
  aliases: []
- id: LINE
  name: Line
  description: A concise text string designed to hook reader attention and trigger
    an emotional or cognitive response; the fundamental unit of persuasive copywriting
    that works across email subjects, headlines, and calls-to-action.
  concept_ids: []
  aliases: []
- id: WRITE_SYMPTOMATIC_SUBJECT_LINES
  name: Write Symptomatic Subject Lines
  description: A copywriting technique that crafts email subject lines by explicitly
    naming the specific painful problem (Hell Island) the audience experiences and
    hinting at concrete relief or prevention, using proven templates focused on ending
    suffering, removing obstacles, or preventing threats without requiring sacrifice.
  concept_ids: []
  aliases: []
- id: SKILL
  name: Skill
  description: A discrete, teachable competency that enables individuals to execute
    specific tasks within Travis Sago's system for building online income, audiences,
    and financial independence.
  concept_ids: []
  aliases: []
- id: WRITE_CAP_FRAMEWORK_EMAIL
  name: Write Cap Framework Email
  description: The ability to construct emails that systematically deliver Child (overt
    benefit addressing present pain), Adult (kitchen table logic proof), and Parent
    (objection handling and newness positioning) elements in a single cohesive message.
  concept_ids: []
  aliases: []
- id: APPLY_TRIANGLE_OF_INSIGHT
  name: Apply Triangle Of Insight
  description: The ability to structure email storytelling using a three-part framework
    that moves from a tangible, observable symptom of pain through a story/analogy/metaphor
    to a wisdom-based offer, creating an insight moment ('braingasm') that makes the
    C.A.P. framework emotionally resonant.
  concept_ids: []
  aliases: []
- id: RSVP
  name: Rsvp
  description: A mechanism to capture high-intent prospects by requesting confirmation
    of attendance, typically used as a filtering step in sales funnels to identify
    engaged audience members.
  concept_ids: []
  aliases: []
- id: WRITE_CAP_CAMPAIGN_EMAIL
  name: Write Cap Campaign Email
  description: The skill of crafting emails that incorporate the C.A.P. Framework
    (Child benefit, Adult proof, Parent objection-handling) in appropriate emphasis
    depending on campaign stage, with all three elements present in each email except
    for Fence Tipper variations.
  concept_ids: []
  aliases: []
- id: WRITE_T3_PERSONALIZED_INVITE
  name: Write T3 Personalized Invite
  description: Craft a casual, permission-based email invitation that uses specific
    personalization and a clear urgency mechanism (like reservation deadlines) to
    invite prospects to an intimate in-person or small-group event teaching the Rainmaker
    Campaign framework. This T3 outreach script establishes credibility, clarifies
    the specific problem you solve for them, and uses conversational tone ('copy and
    paste all the deets for ya') to lower resistance and drive quick RSVP responses.
  concept_ids: []
  aliases: []
- id: WRITE_SYMPTOMATIC_SUBJECT_LINE
  name: Write Symptomatic Subject Line
  description: A skill for crafting email subject lines that map a reader's current
    pain point (Hell Island) and desired outcome (Heaven Island) into templates that
    signal immediate relevance by naming the specific problem they want to stop, fix,
    or avoid. This framework uses symptomatic language and repeatable patterns to
    make readers feel the message was written directly for them.
  concept_ids: []
  aliases: []
- id: MANAGE_T3_FOLLOWUP_SEQUENCE
  name: Manage T3 Followup Sequence
  description: The skill of strategically following up with prospects 2-4 times after
    sending a T3 email based on their currency strength and fit, using proper Gmail
    tagging to track progress and deploying the 'Should I close the file on you?'
    message on later follow-ups before phasing them out.
  concept_ids: []
  aliases: []
- id: EXECUTE_PSM_FOLLOWUP_PIPELINE
  name: Execute Psm Followup Pipeline
  description: 'The skill of executing the complete Phoneless Sales Machine follow-up
    workflow from T3 email through enrollment, including proper tagging systems, follow-up
    cadencing, transitioning qualified prospects into the ''I''m In #1 — Enrollment
    Info Phase,'' and collecting enrollment information before payment collection.'
  concept_ids: []
  aliases: []
- id: RAINMAKER_AGREEMENT
  name: Rainmaker Agreement
  description: The skill of drafting and negotiating a Letter of Understanding that
    documents partnership test terms before money changes hands, specifying roles,
    responsibilities, timelines, intellectual property protections, and compensation
    percentages between promoter and fulfiller.
  concept_ids: []
  aliases: []
- id: LOU
  name: Lou
  description: The skill of creating a Letter of Understanding document that formally
    defines partnership roles, funding responsibilities, customer fulfillment duties,
    affiliate tracking mechanisms, commission calculations, and payment timing to
    structure a promotion test between two parties.
  concept_ids: []
  aliases: []
- id: EVALUATE_NICHE_FOR_PROFITABILITY
  name: Evaluate Niche For Profitability
  description: The systematic skill of validating a niche across three dimensions—demand
    (proven interest through searches and purchases), competition (enough to confirm
    a market exists without being prohibitively saturated), and monetization potential
    (evidence that people will pay for solutions)—before committing time or resources.
  concept_ids: []
  aliases: []
- id: NORTH_STAR
  name: North Star
  description: Serve No Master is the foundational aspiration of financial independence
    and freedom from traditional employment, achieved by building income streams,
    audiences, and assets that generate revenue without depending on a single employer
    or external authority.
  concept_ids: []
  aliases: []
- id: OPTIMIZE_ORDER_FORM
  name: Optimize Order Form
  description: Structure your order form using the G3 framework to reduce friction
    and increase completed purchases by strategically placing persuasion elements.
    Apply psychological principles and layout best practices to move prospects from
    purchase intent to transaction completion.
  concept_ids: []
  aliases: []
- id: DIAGNOSE_MARKETING_ROOT_CAUSE
  name: Diagnose Marketing Root Cause
  description: The skill of systematically examining marketing performance data to
    identify which of the four root causes (message, offer, audience, or channel)
    is actually responsible for underperformance, rather than making random changes
    across all variables.
  concept_ids: []
  aliases: []
- id: RUN_CAP_SALES_CALL
  name: Run Cap Sales Call
  description: The skill of executing the CAP Sales Mojo framework on individual sales
    calls by qualifying prospects, customizing your offer presentation, and ensuring
    each call ends with a clear, defined outcome or next step.
  concept_ids: []
  aliases: []
- id: SHOULD
  name: Should
  description: A principle within the CAP Sales Mojo framework that guides whether
    a prospect is a suitable fit for your offer based on their specific situation
    and needs. Applying 'should' consistently helps you qualify leads and tailor your
    pitch appropriately before moving toward a close.
  concept_ids: []
  aliases: []
- id: APPLY_CONTRAST_IN_COPY
  name: Apply Contrast In Copy
  description: The skill of translating abstract comparisons (like percentages) into
    concrete, tangible contrasts (specific dollar amounts or visual demonstrations)
    that create a mental movie in the reader's mind and make value differences immediately
    obvious without additional explanation.
  concept_ids: []
  aliases: []
- id: CDDC
  name: Cddc
  description: A 'Clearly Different and Desirable Concept' that identifies a counter-intuitive
    breakthrough solution by challenging the assumptions your audience holds about
    their perceived constraint, positioning your offer as a fundamentally different
    alternative to what they think will work.
  concept_ids: []
  aliases: []
- id: COMPLETE_CDDC_WORKSHEET
  name: Complete Cddc Worksheet
  description: A structured worksheet exercise that walks you through identifying
    your audience's tangible constraint, uncovering their hidden assumptions about
    solving it, and articulating your leverage point—the breakthrough that reverses
    or challenges those assumptions to create a compelling, differentiated offer.
  concept_ids: []
  aliases: []
- id: MDMS
  name: Mdms
  description: Million Dollar Marketing Sequence—a framework for structuring promotional
    email sequences with themed hooks, escalating urgency, and clear calls-to-action,
    adapted by Travis from Frank Kern's original architecture and customized for different
    audience contexts (warm vs. cold, new-to-product vs. repeat exposure).
  concept_ids: []
  aliases: []
- id: RUN_NORTH_STAR_SURVEY
  name: Run North Star Survey
  description: Execute a streamlined 3-question survey process to identify directional
    signals about what your audience wants, using the 80/20 principle to extract maximum
    insight with minimum complexity. This skill involves gathering compass-like guidance
    (not certainty) that must be validated against actual audience behavior before
    committing resources to product development.
  concept_ids: []
  aliases: []
- id: BFOT
  name: Bfot
  description: A worksheet-based skill for creating high-converting offers by identifying
    markets with high emotional engagement and daily customer mindshare, enabling
    easier sales and recurring revenue generation.
  concept_ids: []
  aliases: []
- id: SWIPE_FILE
  name: Swipe File
  description: A collection of proven email templates and examples that demonstrate
    engaging storytelling techniques for identifying and marketing to profitable niches
    with high mindshare.
  concept_ids: []
  aliases: []
- id: CONVERSATION_SIGNAL_READING
  name: Conversation Signal Reading
  description: The ability to accurately interpret prospect verbal and non-verbal
    cues during sales conversations to know when to pause, acknowledge concerns, and
    let dialogue progress naturally rather than panic-selling through objections and
    destroying rapport.
  concept_ids: []
  aliases: []
- id: HANDLE_UNFIXABLE_OBJECTIONS
  name: Handle Unfixable Objections
  description: Authentically acknowledge objections you cannot resolve without forcing
    the close, then anchor back to the emotional benefits the prospect identified
    to let them self-correct or make their own decision.
  concept_ids: []
  aliases: []
- id: GRACEFUL_SALES_EXIT
  name: Graceful Sales Exit
  description: Accept a lost sale with genuine appreciation and grace when a prospect
    holds firm on an unfixable objection, maintaining the relationship and your non-neediness
    rather than pushing further.
  concept_ids: []
  aliases: []
- id: RESEND_TO_UNOPENS
  name: Resend To Unopens
  description: The tactical skill of identifying subscribers who didn't open a promotional
    email and resending the same email content with a new subject line to capture
    missed sales opportunities.
  concept_ids: []
  aliases: []
- id: EMAIL_SEGMENT_RESEND
  name: Email Segment Resend
  description: The technical practice of creating an autoresponder segment from non-openers
    and executing a targeted resend to that segment with modified subject lines to
    increase conversion rates.
  concept_ids: []
  aliases: []
- id: DELIVER_IPASTA_WEBINAR
  name: Deliver Ipasta Webinar
  description: The ability to execute a webinar using the iPASTA framework by opening
    with connection and clear expectations, escalating audience awareness of their
    problem, presenting a solution with supporting tips, and closing with a direct
    call to action.
  concept_ids: []
  aliases: []
- id: QUALIFY_PROSPECTS_VIA_T2_OUTREACH
  name: Qualify Prospects Via T2 Outreach
  description: Use personalized T2 emails with 2–3 targeted qualification questions
    to confirm prospect fit (email list size, desired outcome, date commitment) before
    investing time in detailed sales conversations, ensuring you only move forward
    with prospects you can reliably get results for.
  concept_ids: []
  aliases: []
- id: WRITE_T2_PREQUALIFICATION_EMAIL
  name: Write T2 Prequalification Email
  description: Craft a pre-qualification email that screens high-value prospects before
    offering limited-capacity VIP experiences by asking targeted questions about ad
    spend, offer type, pain intensity, and urgency. This skill protects your time
    and energy by filtering for best-fit leads while creating scarcity perception
    around your exclusive offers.
  concept_ids: []
  aliases: []
- id: FAQ
  name: Faq
  description: A section in T3 long-form emails that addresses reader objections with
    blunt, direct answers designed to build trust rather than oversell, leveraging
    simple language and the three-track trance method to trigger buying without polished
    or inflated copy.
  concept_ids: []
  aliases: []
- id: GMAIL_CANNED_RESPONSES
  name: Gmail Canned Responses
  description: A Gmail feature that allows you to save email templates for your T1,
    T2, T3, and follow-up responses, enabling fast retrieval and consistent messaging
    throughout your phoneless sales sequences.
  concept_ids: []
  aliases: []
- id: MANAGE_PSM_EMAIL_PIPELINE
  name: Manage Psm Email Pipeline
  description: The practice of organizing and tracking prospects through the entire
    Phoneless Sales Machine email sequence (T1/T2/T3) and follow-up process using
    Gmail's tagging and canned responses systems to ensure no prospect falls through
    the cracks.
  concept_ids: []
  aliases: []
- id: GMAIL_TAGGING_FOR_FOLLOWUPS
  name: Gmail Tagging For Followups
  description: A Gmail organization system that uses stage-based tags (T2, T3, I'm
    In, Paid) and follow-up-specific tags (T2 Follow Up, T3 Follow Up 1/2, I'm In
    Follow Up) to automatically sort conversations into folders and identify which
    prospects need follow-up action.
  concept_ids: []
