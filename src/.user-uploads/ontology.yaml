- id: CAP
  name: Cap
  description: A sales system framework that operates within the Circle of Money model,
    designed to move prospects through the Problem-Bonding-Marketing-Sales-Delivery
    cycle efficiently. CAP works in conjunction with the T1/T2/T3 email structure
    to avoid inefficient formats (like long sales letters in early-stage emails) and
    instead delivers insights that create the conditions for a sale.
  north_star_ids: []
  aliases: []
- id: CIRCLE_OF_MONEY
  name: Circle Of Money
  description: A continuous business cycle framework with six stages (Problem, Bonding,
    Marketing, Sales, Delivery, New Problem) that should expand with each rotation;
    the cycle stalls or shrinks if any stage is kinked, with delivery quality being
    especially critical to enable the cycle to restart at a new, evolved problem.
  north_star_ids: []
  aliases: []
- id: PARTNERSHIP_DEAL_STRUCTURE
  name: Partnership Deal Structure
  description: A framework for organizing partnerships that clearly delineates which
    party funds and manages promotion versus which party fulfills orders and services
    customers, establishing upfront terms for tracking, commission splits, and payment
    to prevent disputes.
  north_star_ids: []
  aliases: []
- id: CLIENT_STORY_EXTRACTION
  name: Client Story Extraction
  description: A systematic process of drawing out vivid, sensory-rich details from
    client conversations using an Empathy Map framework that captures their thoughts,
    feelings, sights, and actions. This extracted material becomes the raw narrative
    foundation for compelling copy and high-converting marketing campaigns.
  north_star_ids: []
  aliases: []
- id: DEMAND_FIRST_NICHE_SELECTION
  name: Demand First Niche Selection
  description: A core principle for choosing profitable niches by prioritizing proven
    buying intent and measurable market demand over product features, trends, or commission
    rates—focusing on identifying 'hungry crowds that will open their wallets' before
    anything else.
  north_star_ids: []
  aliases: []
- id: NORTH_STAR_SURVEY_METHOD
  name: North Star Survey Method
  description: ''
  north_star_ids: []
  aliases: []
- id: CLIENT_STORY_EMPATHY_MAPPING
  name: Client Story Empathy Mapping
  description: ''
  north_star_ids: []
  aliases: []
- id: CONCEPT
  name: Concept
  description: 'Symptomatic Marketing is a diagnostic framework that treats weak marketing
    performance like a medical diagnosis—identifying observable symptoms (low opens,
    few conversions, poor sales) and tracing them back to one of four root causes:
    message, offer, audience, or channel.'
  north_star_ids: []
  aliases: []
- id: SYMPTOMATIC_MARKETING_DIAGNOSIS
  name: Symptomatic Marketing Diagnosis
  description: 'A diagnostic framework that treats poor marketing performance like
    a medical diagnosis by identifying specific symptoms (low opens, low clicks, poor
    conversions) and tracing them to one of four root causes: message, offer, audience,
    or channel.'
  north_star_ids: []
  aliases: []
- id: CAP_SALES_MOJO
  name: Cap Sales Mojo
  description: A structured framework for running sales conversations that systematically
    qualifies leads, tailors pitches based on prospect fit, and drives toward a specific
    close or next action.
  north_star_ids: []
  aliases: []
- id: RELEVANT_SPECIFICITY
  name: Relevant Specificity
  description: The practice of using concrete, tangible details in copywriting that
    readers can physically point to and that directly connect to their actual lived
    experience, rather than abstract claims or generic benefits.
  north_star_ids: []
  aliases: []
- id: MIND_MOVIE_COPY
  name: Mind Movie Copy
  description: Copywriting that creates a vivid sensory scene by describing specific,
    relatable moments from the reader's real life (like sitting down to watch their
    favorite TV show), allowing them to see themselves in the scenario and feel the
    emotional truth of the offer.
  north_star_ids: []
  aliases: []
- id: CD3
  name: Cd3
  description: A foundational framework in Travis's teaching that represents the core
    progression from creating content, to building an audience (community), to converting
    that audience into customers or revenue—the essential path to earning income online
    and achieving financial independence.
  north_star_ids: []
  aliases: []
- id: CONTRAST_COPYWRITING_TOOL
  name: Contrast Copywriting Tool
  description: A copywriting technique that juxtaposes two clearly different states,
    prices, or outcomes side by side to allow the reader's brain to instantly grasp
    the value difference without lengthy explanation, enabling writers to say more
    with fewer words.
  north_star_ids: []
  aliases: []
- id: MINDSHARE_NICHE_SELECTION
  name: Mindshare Niche Selection
  description: The strategic principle of choosing business niches where target customers
    think about their desire or problem multiple times per day, making them far easier
    to sell to and monetize through recurring revenue models.
  north_star_ids: []
  aliases: []
- id: YELLOW_RED_LIGHT_SIGNALS
  name: Yellow Red Light Signals
  description: A framework for recognizing prospect hesitations (yellow lights) and
    hard rejections (red lights) in sales conversations, where running through yellow
    lights by forcing objections typically escalates them into deal-killing red lights
    rather than allowing them to naturally cycle to green.
  north_star_ids: []
  aliases: []
- id: UNOPENS_RESEND_STRATEGY
  name: Unopens Resend Strategy
  description: A high-leverage email revenue optimization concept that achieves approximately
    50% additional revenue by resending unopened emails with fresh subject lines,
    requiring minimal effort for maximum return.
  north_star_ids: []
  aliases: []
- id: IPASTA_FRAMEWORK
  name: Ipasta Framework
  description: A six-step persuasive communication structure that sequences a webinar
    through Intro, Problem, Agitation, Solution, Tips, and Action to guide audiences
    toward a clear call to action.
  north_star_ids: []
  aliases: []
- id: WEBINAR_STRUCTURE
  name: Webinar Structure
  description: The organizational framework for planning and executing a webinar,
    covering content flow, logistics, timing, engagement tactics, and follow-up to
    ensure all critical elements are prepared and delivered.
  north_star_ids: []
  aliases: []
- id: THREE_TRACK_TRANCE
  name: Three Track Trance
  description: A psychological mechanism where every person has three simultaneous
    internal tracks (Child, Parent, and Adult) that, when addressed in the correct
    tone within an email sequence, can trigger buying decisions regardless of writing
    complexity. Speaking to all three tracks simultaneously creates a trance-like
    state that overcomes objections and drives action.
  north_star_ids: []
  aliases: []
- id: G3_ORDER_FORM_MOJO
  name: G3 Order Form Mojo
  description: A framework for structuring and presenting order forms to maximize
    conversion rates by reducing friction and strategically placing trust signals
    and offer elements. This hands-on training teaches how to optimize the checkout
    flow so prospects move smoothly from purchase decision to completed transaction.
  north_star_ids: []
  aliases: []
- id: BONUS_PLACEMENT_DISTRIBUTION
  name: Bonus Placement Distribution
  description: A distribution strategy where repurposed content assets (like ebooks)
    are placed as bonuses inside other creators' and marketers' welcome sequences,
    download areas, and product offers to gain passive exposure to their existing
    audiences and buyers.
  north_star_ids: []
  aliases: []
- id: PIGGYBANKING_PS_FRAMEWORK
  name: Piggybanking Ps Framework
  description: 'A foundational framework for building passive income by identifying
    the key components (Ps) of existing businesses: Product, Process, and Parade (marketplace).
    Piggybankers leverage this framework to plug into businesses where the marketplace
    and marketing already exist, rather than building from scratch.'
  north_star_ids: []
  aliases: []
- id: MONEY_TREE_ENVIRONMENT
  name: Money Tree Environment
  description: The optimal conditions where income grows with minimal friction, analogous
    to a gardener choosing the right climate for crops; created when you align your
    business model with environments that naturally favor your success rather than
    fighting against unfavorable conditions.
  north_star_ids: []
  aliases: []
- id: LICENSING_MODEL
  name: Licensing Model
  description: A business model where intellectual property, systems, or assets are
    rented to partners (typically affiliates) who leverage their own traffic sources
    and audiences, with revenue split between licensor and licensee while the licensor
    builds their distribution network and customer database as primary payment.
  north_star_ids: []
  aliases: []
- id: FUNNEL_LICENSING
  name: Funnel Licensing
  description: The practice of renting out a proven sales funnel—including email sequences,
    ads, and conversion systems—to affiliates who drive traffic from their own channels,
    allowing the funnel owner to scale distribution and database growth without mastering
    every traffic source themselves.
  north_star_ids: []
  aliases: []
- id: CONTENT_VALUE_CONTEXT_DEPENDENCY
  name: Content Value Context Dependency
  description: The value of any piece of content is not determined by its abundance
    or inherent qualities, but by the positioning, environment, and context in which
    it exists—identical content can be worthless in one situation and worth tens of
    thousands in another, similar to how potato seeds have no value in a desert but
    enormous value in the right soil.
  north_star_ids: []
  aliases: []
- id: LICENSING_IP
  name: Licensing Ip
  description: The practice of granting partners the right to distribute and sell
    your intellectual property (courses, content, information products) through their
    audiences while maintaining control of customer data and access through your own
    platform; enables ongoing royalty income from work created once.
  north_star_ids: []
  aliases: []
- id: CONTENT_AS_CASH
  name: Content As Cash
  description: The principle that content and information products function as tradeable
    assets that generate revenue either directly through sales or indirectly by being
    licensed to partners, eliminating the need to pay for traffic acquisition through
    advertising.
  north_star_ids: []
  aliases: []
- id: RENT_FOR_ROYALTIES
  name: Rent For Royalties
  description: A distribution strategy where you license or place your assets into
    high-traffic locations controlled by sellers or established businesses, earning
    recurring royalty payments instead of making one-time sales to individual consumers.
  north_star_ids: []
  aliases: []
- id: NEWSLETTER_SPONSORSHIP
  name: Newsletter Sponsorship
  description: ''
  north_star_ids: []
  aliases: []
