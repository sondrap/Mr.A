  name: Open Negotiation Call
  description: The critical first moments of a sales or negotiation call where the
    goal is to establish yourself as a real person rather than a corporate entity,
    reducing pressure on both sides and creating space for genuine conversation.
  concept_ids: []
  aliases: []
- id: GREASE_THE_CONVO
  name: Grease The Convo
  description: A concrete technique for opening a call or Zoom by sharing what you're
    literally doing in that moment in a natural, slightly self-deprecating way, instantly
    signaling authenticity and humanity to disarm the other person.
  concept_ids: []
  aliases: []
- id: MINI_MONOPOLY
  name: Mini Monopoly
  description: Creating an uncontested market position by becoming the sole, obvious
    solution for a clearly defined niche, geography, or client type—enabling deal-making
    at favorable terms without competing on even ground.
  concept_ids: []
  aliases: []
- id: GEOGRAPHIC_POSITIONING
  name: Geographic Positioning
  description: Leveraging your native location, local language fluency, and market
    familiarity as undervalued capital assets that create an insurmountable competitive
    moat against non-local competitors in deal-getting.
  concept_ids: []
  aliases: []
- id: COMPETITIVE_DIFFERENTIATION
  name: Competitive Differentiation
  description: Winning deals through specificity and relationship-based positioning
    rather than advertising—identifying the unique angle where you are the only credible
    answer, drawing on personal assets competitors cannot replicate.
  concept_ids: []
  aliases: []
- id: CONTENT_ASSET_DISTRIBUTION
  name: Content Asset Distribution
  description: The skill of strategically packaging and distributing valuable repurposed
    content (such as ebooks) across multiple partner platforms and download areas
    to build visibility, earn revenue through affiliate links, and establish consistent
