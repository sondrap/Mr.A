    Doing) used during client intake calls to extract vivid sensory and emotional
    details that enable compelling storytelling in copy and messaging.
  north_star_ids: []
  aliases: []
- id: CLIENT_STORY_MINING
  name: Client Story Mining
  description: The process of conducting recorded intake calls with clients to gather
    specific, emotionally resonant narrative details and personal experiences that
    transform generic information into mental movies for persuasive copywriting.
  north_star_ids: []
